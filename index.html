<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop Rèm Hải Nam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
header{background:#c62828;color:#fff;text-align:center;padding:15px;font-size:22px;font-weight:bold}
.container{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:8px;margin-top:10px}
input,select,textarea,button{width:100%;padding:10px;margin:6px 0;border-radius:5px;border:1px solid #ccc;font-size:15px}
button{background:#c62828;color:#fff;border:none;font-size:18px;font-weight:bold}
.product-img{width:100%;border-radius:10px;margin-bottom:10px}
.countdown{background:#ffeb3b;text-align:center;padding:10px;font-weight:bold}
</style>
</head>
<body>

<header>SHOP RÈM HẢI NAM</header>

<div class="countdown">
🔥 ƯU ĐÃI KẾT THÚC SAU: <span id="timer"></span>
</div>

<div class="container">

<img src="https://i.imgur.com/7q9Yy8H.jpg" class="product-img">

<h3>ĐẶT HÀNG RÈM CỬA</h3>

<input id="name" placeholder="Họ tên">
<input id="phone" placeholder="Số điện thoại">

<select id="color">
<option>Ghi xám</option>
<option>Be</option>
<option>Xanh</option>
<option>Nâu</option>
<option>Hồng</option>
</select>

<input id="qty" type="number" value="1" min="1">

<select id="province"></select>
<select id="district"></select>
<select id="ward"></select>

<textarea id="address" placeholder="Địa chỉ chi tiết"></textarea>

<button onclick="sendOrder()">🛒 MUA NGAY - GỬI ĐƠN</button>

</div>

<script>
// Đếm ngược
let t=3600;
setInterval(()=>{
let m=Math.floor(t/60),s=t%60;
document.getElementById("timer").innerText=m+"p "+s+"s";
t--;if(t<0)t=3600;
},1000);

// DATA MẪU (mình sẽ gửi bản FULL 63 tỉnh sau)
const data={
"Hà Nội":{"Ba Đình":["Phúc Xá","Trúc Bạch"],"Hoàn Kiếm":["Hàng Bạc","Hàng Gai"]},
"Hồ Chí Minh":{"Quận 1":["Bến Nghé","Bến Thành"],"Quận 7":["Tân Phú","Tân Hưng"]},
"Đà Nẵng":{"Hải Châu":["Hòa Thuận","Bình Hiên"]}
};

let p=document.getElementById("province");
let d=document.getElementById("district");
let w=document.getElementById("ward");

p.innerHTML="<option>Chọn tỉnh/thành</option>";
for(let k in data)p.innerHTML+=`<option>${k}</option>`;

p.onchange=()=>{
d.innerHTML="<option>Chọn huyện/quận</option>";
w.innerHTML="<option>Chọn xã/phường</option>";
for(let k in data[p.value])d.innerHTML+=`<option>${k}</option>`;
};

d.onchange=()=>{
w.innerHTML="<option>Chọn xã/phường</option>";
for(let k of data[p.value][d.value])w.innerHTML+=`<option>${k}</option>`;
};

function sendOrder(){
let msg=
"🛒 ĐƠN HÀNG RÈM HẢI NAM\n"+
"👤 "+name.value+"\n"+
"📞 "+phone.value+"\n"+
"🎨 "+color.value+"\n"+
"📦 SL: "+qty.value+"\n"+
"📍 "+ward.value+", "+district.value+", "+province.value+"\n"+
"🏠 "+address.value;

let page="denhatrem.hainam";
let url="https://m.me/"+page+"?ref="+encodeURIComponent(msg);
window.open(url,"_blank");
}
</script>

</body>
</html>
