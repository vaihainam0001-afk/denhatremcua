<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Rèm Hải Nam</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
.header{background:#c62828;color:#fff;padding:15px;text-align:center;font-size:22px;font-weight:bold}
.container{padding:15px}
.box{background:#fff;padding:15px;border-radius:10px;margin-top:10px}
label{display:block;margin-top:10px;font-weight:bold}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
button{background:#c62828;color:#fff;border:none;padding:15px;width:100%;font-size:18px;border-radius:10px;margin-top:15px}
</style>
</head>

<body>

<div class="header">SHOP RÈM HẢI NAM</div>

<div class="container">
<div class="box">

<h3>ĐẶT HÀNG RÈM CỬA</h3>

<label>Họ tên</label>
<input id="name">

<label>Số điện thoại</label>
<input id="phone">

<label>Màu rèm</label>
<select id="color">
<option>Ghi xám</option>
<option>Xanh rêu</option>
<option>Be sữa</option>
<option>Nâu socola</option>
</select>

<label>Số lượng</label>
<input type="number" id="qty" value="1">

<label>Tỉnh / Thành</label>
<select id="province"></select>

<label>Huyện / Quận</label>
<select id="district"></select>

<label>Xã / Phường</label>
<select id="ward"></select>

<label>Địa chỉ chi tiết</label>
<input id="address">

<button onclick="sendOrder()">🛒 MUA NGAY - GỬI ĐƠN</button>

</div>
</div>

<script>
let dataVN = [];

fetch("https://raw.githubusercontent.com/nhidh99/countries/master/vn.json")
.then(res => res.json())
.then(data => {
  dataVN = data;
  let province = document.getElementById("province");
  province.innerHTML = `<option value="">Chọn tỉnh</option>`;
  data.forEach(p => {
    province.innerHTML += `<option value="${p.Name}">${p.Name}</option>`;
  });
});

document.getElementById("province").addEventListener("change", function(){
  let p = dataVN.find(x => x.Name == this.value);
  let district = document.getElementById("district");
  district.innerHTML = `<option>Chọn huyện</option>`;
  document.getElementById("ward").innerHTML = `<option>Chọn xã</option>`;
  p.Districts.forEach(d => {
    district.innerHTML += `<option value="${d.Name}">${d.Name}</option>`;
  });
});

document.getElementById("district").addEventListener("change", function(){
  let p = dataVN.find(x => x.Name == province.value);
  let d = p.Districts.find(x => x.Name == this.value);
  let ward = document.getElementById("ward");
  ward.innerHTML = `<option>Chọn xã</option>`;
  d.Wards.forEach(w => {
    ward.innerHTML += `<option>${w.Name}</option>`;
  });
});

function sendOrder(){
let text =
"ĐƠN HÀNG RÈM HẢI NAM%0A"
+"Tên: "+name.value+"%0A"
+"SĐT: "+phone.value+"%0A"
+"Màu: "+color.value+"%0A"
+"Số lượng: "+qty.value+"%0A"
+"Tỉnh: "+province.value+"%0A"
+"Huyện: "+district.value+"%0A"
+"Xã: "+ward.value+"%0A"
+"Địa chỉ: "+address.value;

window.open("https://m.me/denhatrem.hainam?text="+text,"_blank");
}
</script>

</body>
</html>
