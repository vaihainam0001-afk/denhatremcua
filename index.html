<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Rèm Hải Nam</title>
<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
.container{max-width:420px;margin:auto;background:#fff}
.header{background:#c62828;color:#fff;padding:15px;text-align:center}
.price{color:#e53935;font-size:22px;font-weight:bold}
.product-img{width:100%}
.box{padding:12px;border-bottom:1px solid #ddd}
select,input,textarea,button{
  width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #ccc
}
button{background:#e53935;color:white;font-size:16px;border:none}
.zalo{background:#2196f3}
.mess{background:#4267B2}
.contact{display:flex;gap:10px;padding:10px}
.badge{background:#ffebee;color:#c62828;padding:5px 10px;border-radius:20px;display:inline-block;margin-bottom:5px}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h2>🪟 Shop Rèm Hải Nam</h2>
<p>Rèm cửa chống nắng cao cấp</p>
</div>

<img src="https://i.imgur.com/qZ9QZ6F.jpg" class="product-img">

<div class="box">
<span class="badge">BÁN CHẠY</span>
<h3>Rèm cửa dán tường không khoan</h3>
<p class="price">199.000đ</p>
<ul>
<li>✔ Chống nắng 100%</li>
<li>✔ Không khoan tường</li>
<li>✔ Phù hợp phòng trọ – chung cư</li>
</ul>
</div>

<div class="box">
<h3>🎨 Chọn màu</h3>
<select id="color">
<option>Be</option>
<option>Xám</option>
<option>Xanh</option>
<option>Hồng</option>
</select>

<h3>📏 Chọn kích thước</h3>
<select id="size">
<option>1m x 1m8</option>
<option>1m2 x 2m</option>
<option>1m5 x 2m</option>
</select>
</div>

<div class="box">
<h3>📦 ĐẶT HÀNG NGAY</h3>
<input id="name" placeholder="Họ và tên">
<input id="phone" placeholder="Số điện thoại">
<textarea id="address" placeholder="Địa chỉ nhận hàng"></textarea>
<button onclick="sendOrder()">ĐẶT HÀNG NGAY</button>
</div>

<div class="contact">
<a href="https://zalo.me/84903850285" target="_blank" style="flex:1;">
<button class="zalo">💬 Chat Zalo</button>
</a>

<a href="https://m.me/" target="_blank" style="flex:1;">
<button class="mess">💬 Messenger</button>
</a>
</div>

</div>

<script>
function sendOrder(){
var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var address=document.getElementById("address").value;
var color=document.getElementById("color").value;
var size=document.getElementById("size").value;

var text="ĐƠN HÀNG RÈM CỬA%0A"
+"Tên: "+name+"%0A"
+"SĐT: "+phone+"%0A"
+"Địa chỉ: "+address+"%0A"
+"Màu: "+color+"%0A"
+"Kích thước: "+size;

window.open("https://zalo.me/84903850285?text="+text);
}
</script>

</body>
</html>
